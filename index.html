<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador Pro</title>
    <!--link css-->
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="./assets/css/resete.css" />
    <!---->
</head>

<body>
    <!--header menu-navigation-->
    <header class="menu-navigation">
        <div class="container-page">
            <div class="flex-position">
                <div class="logo-brands">
                    <img src="./assets/img/icon-rocket.png" alt="icon-rocket" />
                    <h2>Contador Pro</h2>
                </div>
                <div class="moon-icon">
                    <div id="click-moon" class="img-moon">
                        <img src="./assets/img/moon.png" alt="moon" />
                    </div>
                </div>
            </div>
        </div>
    </header>
    <!---->
    <!--section hero-bg-->
    <section class="hero-bg">
        <div class="container-page">
            <div class="title-bg">
                <h1>Analise seu texto em tempo real</h1>
            </div>
            <div class="input-textarea">
                <textarea id="texto" placeholder="Digite seu texto aqui..."></textarea>
                <div class="flex-position">
                    <div class="details-space">
                        <label id="label-one">
                            <input id="excluir-espacos" type="checkbox">
                            Excluir espaços
                        </label>
                    </div>
                    <div class="set-limit">
                        <label id="label-two">
                            <input type="checkbox">
                            definir limite de caracteres
                        </label>
                    </div>
                    <div class="temp-read">
                        <p id="tempo-leitura">Tempo de leitura aproximado: 0 minuto</p>
                    </div>
                </div>
            </div>
            <div class="box-wrapper">
                <div class="card-fil">
                    <div class="number-total">
                        <h2 id="contador-caracteres" >0</h2>
                        <p>Total de Caracteres</p>
                    </div>
                </div>
                <div class="card-fil">
                    <div class="word-count">
                        <h2 id="contador-palavras">0</h2>
                        <p>Total de Palavras</p>
                    </div>
                </div>
                <div class="card-fil">
                    <div class="sentence-count">
                        <h2 id="contador-frases">0</h2>
                        <p>Contagem de Frases</p>
                    </div>
                </div>
            </div>
            <div class="subtitle-al">
                <h2>densidade de letras</h2>
            </div>
            <div class="dimension-parts">
                <div class="sub-letter">
                    <div class="letter-1">
                        <p>E</p>
                    </div>
                    <div class="bar-size">
                        <div class="color-size"></div>
                    </div>
                    <div class="percentage-one">
                        <p>40(16.06%)</p>
                    </div>
                </div>
                <div class="sub-letter2">
                    <div class="letter-2">
                        <p>I</p>
                    </div>
                    <div class="bar-size2">
                        <div class="color-size2"></div>
                    </div>
                    <div class="percentage-two">
                        <p>29 (11.65%)</p>
                    </div>
                </div>
                <div class="sub-letter3">
                    <div class="letter-3">
                        <p>T</p>
                    </div>
                    <div class="bar-size3">
                        <div class="color-size3"></div>
                    </div>
                    <div class="percentage-three">
                        <p>28(11.24%)</p>
                    </div>
                </div>
                <div class="sub-letter4">
                    <div class="letter-4">
                        <p>O</p>
                    </div>
                    <div class="bar-size4">
                        <div class="color-size4"></div>
                    </div>
                    <div class="percentage-four">
                        <p>22(8.84%)</p>
                    </div>
                </div>
                <div class="sub-letter5">
                    <div class="letter-5">
                        <p>E</p>
                    </div>
                    <div class="bar-size5">
                        <div class="color-size5"></div>
                    </div>
                    <div class="percentage-five">
                        <p>21(8.43%)</p>
                    </div>
                </div>
            </div>
        </div>
        </div>
    </section>
    <!---->
    <!--script js-->
    <script src="./assets/js/script.js"></script>
    <!---->
</body>
</html>
